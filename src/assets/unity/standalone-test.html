<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Generation_Tree — standalone (no Angular)</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #231f20; }
    /* Match the Angular app's canvas sizing so DPR / resolution are comparable */
    #unity-canvas { width: 100%; height: 100vh; display: block; background: #231f20; }
    #info {
      position: fixed; top: 8px; left: 8px; z-index: 10;
      font: 12px/1.4 monospace; color: #9fe; background: rgba(0,0,0,.55);
      padding: 6px 10px; border-radius: 4px; white-space: pre;
    }
  </style>
</head>
<body>
  <!--
    PURPOSE: Run the EXACT same Unity build as the Angular app, but with NO Angular,
    NO zone.js, NO memory monitor, NO reload logic — the plain Unity WebGL template.

    Serve it from the same place as the build (this file sits next to Build/), then:
      - locally:   http://localhost:4200/assets/unity/standalone-test.html
      - deployed:  https://<host>/angular-app/assets/unity/standalone-test.html

    Then interact (pan / zoom / click nodes) the same way you reproduce the OOM in
    the app, and watch the heap counter below.

      * If THIS page also OOMs  -> the leak is in the Unity build/content, not Angular.
      * If THIS page stays flat -> the Angular embedding is implicated; keep digging there.
  -->
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <div id="info">loading…</div>

  <script>
    // Unity calls window.onUnityMessage on node clicks. Stub it so interactions
    // don't throw (the Angular app provides the real handler).
    window.onUnityMessage = function (m) { /* no-op for the isolation test */ };

    var canvas = document.querySelector("#unity-canvas");
    var info = document.querySelector("#info");

    // Same config as the Angular component, minus anything Angular-specific.
    var config = {
      dataUrl: "Build/Build.data.unityweb",
      frameworkUrl: "Build/Build.framework.js.unityweb",
      codeUrl: "Build/Build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "iii",
      productName: "Generation_Tree",
      productVersion: "0.1.0",
    };

    var unityInstance = null;

    // Poll the REAL wasm linear heap (this is what OOMs at ~2GB), not the JS heap.
    setInterval(function () {
      var line = "";
      try {
        if (unityInstance && unityInstance.Module && unityInstance.Module.HEAP8) {
          var wasmMB = unityInstance.Module.HEAP8.length / 1048576;
          line += "wasm heap: " + wasmMB.toFixed(1) + " MB / ~2048 MB";
        } else {
          line += "wasm heap: (not ready)";
        }
      } catch (e) { line += "wasm heap: n/a"; }
      if (performance.memory) {
        line += "\njs heap:   " + (performance.memory.usedJSHeapSize / 1048576).toFixed(1) + " MB";
      }
      line += "\ndpr:       " + (window.devicePixelRatio || 1);
      line += "\ncanvas:    " + canvas.width + "x" + canvas.height + " (drawing buffer)";
      info.textContent = line;
    }, 1000);

    var script = document.createElement("script");
    script.src = "Build/Build.loader.js";
    script.onload = function () {
      createUnityInstance(canvas, config, function (p) {
        info.textContent = "loading… " + Math.round(p * 100) + "%";
      }).then(function (inst) {
        unityInstance = inst;
      }).catch(function (err) {
        info.textContent = "init failed: " + err;
        console.error(err);
      });
    };
    script.onerror = function () { info.textContent = "failed to load Build.loader.js"; };
    document.body.appendChild(script);
  </script>
</body>
</html>
