<div class="unity-container">
    @if (isUnityLoading) {
        <div class="unity-loader-overlay">
            <div class="loader-content">
                <div class="spinner"></div>
                <h3>{{ loadingMessage }}</h3>
                <div class="progress-bar">
                    <div class="progress-fill" [style.width.%]="loadingProgress"></div>
                </div>
                <span class="progress-text">{{ loadingProgress }}%</span>
            </div>
        </div>
    }

    <div class="unity-controls">
        <button class="refresh-button" (click)="reloadUnity()" [disabled]="isUnityLoading" aria-label="Refresh">
            <svg class="refresh-icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
        </button>
    </div>

    <canvas #unityCanvas id="unity-canvas" tabindex="-1"></canvas>

    @if(loading) {
        <div class="siu">Loading...</div>
    }
</div>
